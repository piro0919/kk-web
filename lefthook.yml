pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "**/*.{ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
    prettier:
      glob: "**/*"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    secretlint:
      glob: "**/*"
      run: pnpm exec secretlint --maskSecrets {staged_files}
    stylelint:
      glob: "**/*.css"
      run: pnpm exec stylelint --fix {staged_files}
      stage_fixed: true
    typescript:
      run: pnpm exec tsc --noEmit
commit-msg:
  scripts:
    "commitlint.sh":
      runner: bash
